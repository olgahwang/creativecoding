<!DOCTYPE html>
<html lang="en">
<head>
  <title>Olga experiments</title>
  <link rel='icon' href='./favicon.ico' type='image/x-icon'>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" type="text/css" href="./typography.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 36px 40px;
      z-index: 100;
      pointer-events: none;
    }
    .header h4 { font-size: 1rem; font-weight: 400; letter-spacing: 0.02em; }

    .description {
      position: fixed;
      bottom: 40px; left: 40px;
      max-width: 320px;
      z-index: 100;
      pointer-events: none;
    }
    .description p {
      font-size: 0.9rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.6);
    }
    .description a {
      color: #A3FF09;
      pointer-events: all;
      text-decoration: none;
    }
    .description a:hover { text-decoration: underline; }

    .links {
      position: fixed;
      bottom: 40px; right: 40px;
      display: flex;
      gap: 24px;
      z-index: 100;
    }
    .links a {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .links a:hover { color: #fff; }

    /* ── Cards ── */
    #cards-container {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    .card {
      position: absolute;
      width: 420px;
      border-radius: 2px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      will-change: transform;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      transition: box-shadow 0.15s ease;
    }
    .card:active { cursor: grabbing; }
    .card.dragging { box-shadow: 0 20px 70px rgba(0,0,0,0.8); z-index: 999 !important; }

    /* iframe preview */
    .card-preview {
      width: 420px;
      height: 333px;
      overflow: hidden;
      position: relative;
      pointer-events: none;
    }
    .card-preview iframe {
      width: 1280px;
      height: 1016px;
      border: none;
      transform: scale(0.328125);
      transform-origin: top left;
      pointer-events: none;
    }

    .card-footer {
      padding: 14px 16px 18px;
    }
    .card-num {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="header">
    <h4>Olga's</h4>
    <h4>Digital</h4>
  </div>

  <div class="description">
    <p>
      Olga Khvan is a designer and artist. Here are some random experiments with creative coding.
      <a href="http://khvan.design">Full portfolio →</a>
    </p>
  </div>

  <div class="links">
    <a href="https://github.com/olgahwang">Github</a>
    <a href="https://www.linkedin.com/in/olgakhvan/">LinkedIn</a>
  </div>

  <div id="cards-container"></div>

  <script>
    const projects = [
      { num: "01", title: "Wavy type",    href: "./01_wavy_text.html",  bg: "#1A1A1A" },
      { num: "02", title: "Blue blob",    href: "./02_blue_blob.html",   bg: "#1A1A1A" },
      { num: "03", title: "Type draw",    href: "./03_type_draw.html",   bg: "#1A1A1A" },
      { num: "04", title: "Type Tornado", href: "./04_type_tornado.html",bg: "#1A1A1A" },
      { num: "05", title: "Astro Jet",    href: "./05_Jet.html",         bg: "#1A1A1A" },
    ];

    function createCard(proj) {
      const card = document.createElement("div");
      card.className = "card";

      // iframe preview
      const preview = document.createElement("div");
      preview.className = "card-preview";
      preview.style.background = proj.bg;

      const iframe = document.createElement("iframe");
      iframe.src = proj.href;
      iframe.scrolling = "no";
      iframe.tabIndex = -1;
      preview.appendChild(iframe);
      card.appendChild(preview);

      // footer
      const footer = document.createElement("div");
      footer.className = "card-footer";
      footer.style.background = proj.bg;

      const num = document.createElement("div");
      num.className = "card-num";
      num.textContent = proj.num;

      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = proj.title;

      footer.appendChild(num);
      footer.appendChild(title);
      card.appendChild(footer);

      return card;
    }

    const STORAGE_KEY = 'cc_card_positions_v2';

    function freshPositions(n) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const cw = 420, ch = 400;
      return Array.from({ length: n }, () => ({
        x:   Math.random() * (vw - cw),
        y:   Math.random() * (vh - ch),
        rot: (Math.random() - 0.5) * 24,
      }));
    }

    function loadPositions(n) {
      // If positions already exist in sessionStorage, reuse them
      try {
        const saved = sessionStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.length === n) return parsed;
        }
      } catch (_) {}
      // First visit this session — generate and persist
      const positions = freshPositions(n);
      savePositions(positions);
      return positions;
    }

    function savePositions(positions) {
      try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(positions)); } catch (_) {}
    }

    function makeDraggable(card, href, index, allCards, positions) {
      let dragging = false, moved = false;
      let startX, startY, origLeft, origTop;

      card.addEventListener("mousedown", (e) => {
        e.preventDefault();
        dragging = true; moved = false;
        startX = e.clientX; startY = e.clientY;
        origLeft = parseFloat(card.style.left);
        origTop  = parseFloat(card.style.top);
        card.classList.add("dragging");
        allCards.forEach(c => { if (c !== card) c.style.zIndex = 10; });
      });

      document.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
        card.style.left = (origLeft + dx) + "px";
        card.style.top  = (origTop  + dy) + "px";
      });

      document.addEventListener("mouseup", () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove("dragging");
        if (!moved) {
          window.location.href = href;
        } else {
          // Persist updated position
          positions[index].x = parseFloat(card.style.left);
          positions[index].y = parseFloat(card.style.top);
          savePositions(positions);
        }
      });

      card.addEventListener("touchstart", (e) => {
        moved = false;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        origLeft = parseFloat(card.style.left);
        origTop  = parseFloat(card.style.top);
        card.style.zIndex = 999;
      }, { passive: true });

      card.addEventListener("touchmove", (e) => {
        e.preventDefault();
        const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
        card.style.left = (origLeft + dx) + "px";
        card.style.top  = (origTop  + dy) + "px";
      }, { passive: false });

      card.addEventListener("touchend", () => {
        if (!moved) {
          window.location.href = href;
        } else {
          positions[index].x = parseFloat(card.style.left);
          positions[index].y = parseFloat(card.style.top);
          savePositions(positions);
        }
      });
    }

    const container = document.getElementById("cards-container");
    const positions = loadPositions(projects.length);
    const allCards  = [];

    projects.forEach((proj, i) => {
      const card = createCard(proj);
      const { x, y, rot } = positions[i];
      card.style.left = x + "px";
      card.style.top  = y + "px";
      card.style.transform = `rotate(${rot}deg)`;
      card.style.zIndex = 10 + i;
      container.appendChild(card);
      allCards.push(card);
    });

    projects.forEach((proj, i) => {
      makeDraggable(allCards[i], proj.href, i, allCards, positions);
    });
  </script>
</body>
</html>
